name: World-class widget refactor

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/world-class-widget-refactor.yml

permissions:
  contents: write

jobs:
  refactor:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Refactor widget source
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          conversation = Path("src/components/widget/AssistantConversation.tsx")
          text = conversation.read_text()
          text = text.replace('import { useHorizontalDrag } from "../../hooks/useHorizontalDrag";\n', '')
          text = text.replace('  const quickRepliesDrag = useHorizontalDrag<HTMLDivElement>();\n', '')
          text = text.replace('        {...quickRepliesDrag}\n', '')
          text = text.replace(
              'Dobrý deň! Som váš webový asistent. Pomôžem vám vybrať chatbota alebo kalkulačku, ktorá dáva pre váš web zmysel.',
              'Dobrý deň! Som váš webový asistent. Pomôžem vám vybrať chatbota na mieru — aj s kalkulačkou, konfigurátorom alebo rezerváciami.',
          )
          text = text.replace(
              'Najrýchlejšie začnete v konfigurátore — návrh riešenia máte do minúty. Alebo mi napíšte, čo má váš web zjednodušiť.',
              'Najrýchlejšie začnete cez „Vyskladať riešenie“. Za minútu pripravíte zadanie, funkcie aj kontakt bez zdĺhavého formulára.',
          )
          if 'useHorizontalDrag' in text or 'quickRepliesDrag' in text:
              raise SystemExit('horizontal drag removal failed')
          conversation.write_text(text)

          calculator = Path("src/components/widget/ToolCalculator.tsx")
          text = calculator.read_text()
          text = text.replace('  PRIORITIES,\n', '')
          text = text.replace('  const [priority, setPriority] = useState<string | null>(null);\n', '')
          text = text.replace('    setPriority(null);\n', '')
          text = text.replace('      case "priority":\n        return priority !== null;\n', '')
          text = text.replace('    ["Hlavný cieľ", labelOf(PRIORITIES, priority)],\n', '')
          text = re.sub(
              r'\n\s*\{stepId === "priority" \? \(.*?\n\s*\) : null\}\n',
              '\n',
              text,
              count=1,
              flags=re.S,
          )
          text = re.sub(r'\n\s*data-glide\n', '\n', text)

          contact_start = text.index('{stepId === "contact" ? (')
          summary_start = text.index('              <div className="cw-summary">', contact_start)
          lead_start = text.index('              <div className="cw-lead">', summary_start)
          end_marker = '\n            </>\n          ) : null}'
          contact_end = text.index(end_marker, lead_start)
          summary_block = text[summary_start:lead_start].rstrip()
          lead_block = text[lead_start:contact_end].rstrip()
          text = text[:summary_start] + lead_block + '\n\n' + summary_block + text[contact_end:]

          if 'PRIORITIES' in text or 'stepId === "priority"' in text or 'data-glide' in text:
              raise SystemExit('dead priority/glide code remains')
          if text.index('<div className="cw-lead">', contact_start) > text.index('<div className="cw-summary">', contact_start):
              raise SystemExit('contact is not before summary in source')
          calculator.write_text(text)

          css = Path("src/requested-polish.css")
          text = css.read_text()
          text = re.sub(
              r'/\* Contact fields are shown before the recap on the final step\. \*/.*?\.cw-lead \{',
              '/* Contact form is first in the React source; styling only. */\n.cw-lead {',
              text,
              count=1,
              flags=re.S,
          )
          text = re.sub(
              r'\n/\* The removed priority step should not leave an empty summary row\. \*/\n\.cw-summary \.cw-summary__row:nth-of-type\(3\) \{ display: none !important; \}\n',
              '\n',
              text,
              count=1,
          )
          text += r'''

          /* Quick choices never drag sideways. They wrap naturally and preserve vertical page gestures. */
          .cw-quick-replies {
            display: flex !important;
            flex-wrap: wrap !important;
            gap: 7px !important;
            overflow: visible !important;
            touch-action: pan-y !important;
            cursor: default !important;
          }

          .cw-quick-replies .cw-chip {
            flex: 0 1 auto;
          }

          .cw-quick-replies .cw-chip--primary {
            margin-left: auto;
          }

          .cw-calc-step:has(.cw-lead) > .cw-summary {
            margin-top: 12px !important;
          }

          @media (max-width: 520px) {
            .cw-quick-replies {
              display: grid !important;
              grid-template-columns: 1fr 1fr;
            }

            .cw-quick-replies .cw-chip {
              width: 100%;
              min-width: 0;
              justify-content: center;
              white-space: normal;
              text-align: center;
            }

            .cw-quick-replies .cw-chip--primary {
              grid-column: 1 / -1;
              margin-left: 0;
            }

            .cw-inputbar input,
            .cw-lead input,
            .cw-lead textarea,
            .cw-custom textarea {
              font-size: 16px !important;
            }
          }

          @media (max-width: 360px) {
            .cw-quick-replies { grid-template-columns: 1fr; }
            .cw-quick-replies .cw-chip--primary { grid-column: auto; }
          }
          '''
          css.write_text(text)

          tests = Path("tests/widget-contract.test.mjs")
          tests.write_text(r'''import test from "node:test";
          import assert from "node:assert/strict";
          import { readFile } from "node:fs/promises";

          const read = (path) => readFile(new URL(`../${path}`, import.meta.url), "utf8");

          test("primary actions use mint and red is reserved for close hover", async () => {
            const css = await read("src/requested-polish.css");
            assert.match(css, /--cw-action:\s*#64e3b3/i);
            assert.match(css, /--cw-action-hover:\s*#7af0c5/i);
            assert.match(css, /\.cw-panel-head__close:hover[\s\S]*?#ff6c67/i);
            assert.doesNotMatch(css, /--cw-action:\s*#f26f4f/i);
          });

          test("mode tabs switch directly and expose online state", async () => {
            const widget = await read("src/components/widget/AssistantWidget.tsx");
            assert.match(widget, /<i aria-hidden="true" \/> Online/);
            assert.match(widget, /onClick=\{\(\) => switchMode\("calculator"\)\}/);
            assert.match(widget, /onClick=\{\(\) => switchMode\("assistant"\)\}/);
            assert.doesNotMatch(widget, /onPointerMove=\{handleTabPointerMove\}/);
          });

          test("builder source has no dead priority step or glide rotation hooks", async () => {
            const flow = await read("src/lib/assistantFlow.ts");
            const calculator = await read("src/components/widget/ToolCalculator.tsx");
            const stepsMatch = flow.match(/export const STEPS:[\s\S]*?= \[([\s\S]*?)\];/);
            assert.ok(stepsMatch, "STEPS definition missing");
            assert.doesNotMatch(stepsMatch[1], /"priority"/);
            assert.match(stepsMatch[1], /"contact"\s*,?\s*$/m);
            assert.doesNotMatch(calculator, /PRIORITIES|stepId === "priority"|data-glide/);
            assert.match(flow, /whatsapp/);
            assert.match(flow, /volanie/);
            assert.match(flow, /platba/);
          });

          test("contact is before recap in React source", async () => {
            const calculator = await read("src/components/widget/ToolCalculator.tsx");
            const contactStep = calculator.slice(calculator.indexOf('{stepId === "contact" ? ('));
            assert.ok(contactStep.indexOf('<div className="cw-lead">') >= 0);
            assert.ok(contactStep.indexOf('<div className="cw-lead">') < contactStep.indexOf('<div className="cw-summary">'));
          });

          test("quick replies wrap without horizontal drag and mobile fields prevent zoom", async () => {
            const conversation = await read("src/components/widget/AssistantConversation.tsx");
            const css = await read("src/requested-polish.css");
            assert.doesNotMatch(conversation, /useHorizontalDrag|quickRepliesDrag/);
            assert.match(css, /\.cw-quick-replies[\s\S]*?flex-wrap:\s*wrap/i);
            assert.match(css, /touch-action:\s*pan-y/i);
            assert.match(css, /font-size:\s*16px !important/i);
          });
          ''')
          PY
      - name: Format
        run: pnpm exec prettier --write src/components/widget/AssistantConversation.tsx src/components/widget/ToolCalculator.tsx src/requested-polish.css tests/widget-contract.test.mjs
      - name: Type check
        run: pnpm lint
      - name: Contract tests
        run: pnpm test -- --run
      - name: Production build
        run: pnpm build
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: make widget flow direct, stable and mobile-first [skip widget-quality]"
          git push origin HEAD:main
