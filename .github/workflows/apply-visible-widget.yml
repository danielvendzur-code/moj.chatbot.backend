name: Apply visible widget rebuild

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/visible-widget-rebuild'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/visible-widget-rebuild
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply reviewed source patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/visible-widget-patch/part-*.txt | base64 --decode | gzip -dc > /tmp/visible-widget.patch
          git apply --check -p1 /tmp/visible-widget.patch
          git apply -p1 /tmp/visible-widget.patch
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate complete widget
        run: |
          pnpm run lint
          pnpm run test
          pnpm run build
      - name: Commit validated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/lead.ts src/approved-submit-final.css src/components/widget/AssistantConversation.tsx src/components/widget/AssistantWidget.tsx src/components/widget/ToolCalculator.tsx src/embed.tsx src/lib/assistantFlow.ts src/lib/leadApi.ts src/main.tsx tests/widget-contract.test.mjs
          git diff --cached --quiet && exit 0
          git commit -m "Rebuild visible chatbot controls and contact flow"
          git push origin HEAD:agent/visible-widget-rebuild
