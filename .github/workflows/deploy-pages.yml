name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site and embed widget
        run: pnpm build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Checkout latest main for deployment record
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Record successful widget deployment
        shell: bash
        run: |
          {
            echo "deployment=success"
            echo "source_sha=${GITHUB_SHA}"
            echo "page_url=${{ steps.deployment.outputs.page_url }}"
            echo "deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > PAGES_DEPLOY_AUDIT.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PAGES_DEPLOY_AUDIT.txt
          git commit -m "chore: record widget Pages deployment [skip widget-quality]" || exit 0
          git push origin HEAD:main
