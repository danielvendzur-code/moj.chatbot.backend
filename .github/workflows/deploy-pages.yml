name: Deploy and verify chatbot

on:
  push:
    branches: [main]
    paths-ignore:
      - "WIDGET_QUALITY_AUDIT.txt"
      - "PAGES_DEPLOY_AUDIT.txt"
      - "PAGES_WORKFLOW_STATUS.txt"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: TypeScript check
        run: pnpm lint

      - name: Run visual security and lead contracts
        run: pnpm test -- --run

      - name: Build demo and embedded widget
        run: pnpm build

      - name: Create immutable build metadata
        shell: bash
        run: |
          node -e 'const fs=require("fs");fs.writeFileSync("dist/build-meta.json",JSON.stringify({sourceSha:process.env.GITHUB_SHA,generatedAt:new Date().toISOString(),version:"competition-redesign-20260723-v10"},null,2))'

      - name: Validate production artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/widget.js
          test -f dist/widget.css
          test -f dist/build-meta.json
          test -f api/lead.ts
          node <<'NODE'
          const fs = require('fs');
          const css = fs.readFileSync('dist/widget.css', 'utf8');
          const js = fs.readFileSync('dist/widget.js', 'utf8');
          const main = fs.readFileSync('src/main.tsx', 'utf8');
          const embed = fs.readFileSync('src/embed.tsx', 'utf8');
          const conversation = fs.readFileSync('src/components/widget/AssistantConversation.tsx', 'utf8');
          const calculator = fs.readFileSync('src/components/widget/ToolCalculator.tsx', 'utf8');
          const flow = fs.readFileSync('src/lib/assistantFlow.ts', 'utf8');
          const lead = fs.readFileSync('src/lib/leadApi.ts', 'utf8');
          const finalCss = fs.readFileSync('src/approved-submit-final.css', 'utf8');
          const meta = JSON.parse(fs.readFileSync('dist/build-meta.json', 'utf8'));

          const must = (condition, message) => {
            if (!condition) throw new Error(message);
          };

          must(js.includes('competition-redesign-20260723-v10'), 'widget version missing');
          must(css.includes('cw-choice-grid--interest'), 'interest grid missing');
          must(css.includes('cw-selection-indicator'), 'selection indicator missing');
          must(/border-radius:\s*999px/.test(css), 'oval geometry missing');
          must(/--mc-blue:\s*#3478f6/i.test(css), 'website blue missing');
          must(main.includes('assistant-redesign') && embed.includes('assistant-redesign'), 'redesign import missing');
          must(!main.includes('installWidgetSpotlight') && !embed.includes('installWidgetSpotlight'), 'legacy builder spotlight still mounted');
          must(finalCss.includes('Visible widget rebuild'), 'visible widget rebuild layer missing');
          must(finalCss.includes('.cw-contact-methods'), 'presentation method controls missing');
          must(calculator.includes('Osobné stretnutie'), 'personal meeting option missing');
          must(lead.includes('api/lead'), 'lead API missing');
          must(conversation.includes('Vyskladať riešenie'), 'builder CTA missing');
          must(flow.includes('Čo má váš web vybaviť za vás?'), 'first question missing');
          must(flow.includes('Nie som si istý'), 'safe fallback option missing');
          must(!/(#2aa|#1fa|teal|turquoise)/i.test(css), 'forbidden colour remains');
          must(!calculator.includes('cw-choice-arrow'), 'legacy choice arrow remains');
          must(!js.includes('REPLACE-ME'), 'placeholder remains');
          must(meta.sourceSha === process.env.GITHUB_SHA, 'build metadata SHA mismatch');
          NODE

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify live demo and embedded assets
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BASE="${PAGE_URL%/}"

          verify() {
            local path="$1"
            local expected="$2"
            local body="/tmp/widget-live-$(echo "$path" | tr '/.' '__').txt"

            for attempt in {1..24}; do
              if curl --location --fail --silent --show-error \
                --header "Cache-Control: no-cache" \
                "${BASE}${path}?verify=${SOURCE_SHA}-${attempt}" > "$body"; then
                if grep -Fqi "$expected" "$body"; then
                  echo "verified ${path}"
                  return 0
                fi
              fi
              sleep 5
            done

            echo "Live verification failed for ${path}"
            head -c 1000 "$body" 2>/dev/null || true
            return 1
          }

          verify "/" "Môj Chatbot"
          verify "/widget.js" "competition-redesign-20260723-v10"
          verify "/widget.css" "cw-selection-indicator"
          verify "/build-meta.json" "$SOURCE_SHA"

      - name: Checkout latest main for deployment record
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Record verified widget deployment
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          {
            echo "deployment=success"
            echo "dependency_audit=success"
            echo "live_smoke=success"
            echo "source_sha=${SOURCE_SHA}"
            echo "page_url=${PAGE_URL}"
            echo "deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > PAGES_DEPLOY_AUDIT.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PAGES_DEPLOY_AUDIT.txt
          git commit -m "chore: record verified widget deployment [skip widget-quality]" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main

  diagnostics:
    if: ${{ always() && github.actor != 'github-actions[bot]' }}
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main for workflow status
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record workflow outcome
        shell: bash
        env:
          SOURCE_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          {
            echo "source_sha=${SOURCE_SHA}"
            echo "run_id=${RUN_ID}"
            echo "build_result=${BUILD_RESULT}"
            echo "deploy_result=${DEPLOY_RESULT}"
            echo "recorded_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > PAGES_WORKFLOW_STATUS.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PAGES_WORKFLOW_STATUS.txt
          git diff --cached --quiet && exit 0
          git commit -m "chore: record chatbot Pages workflow outcome [skip widget-quality]"
          git pull --rebase origin main
          git push origin HEAD:main
