name: Deploy and verify chatbot

on:
  push:
    branches: [main]
    paths-ignore:
      - "WIDGET_QUALITY_AUDIT.txt"
      - "PAGES_DEPLOY_AUDIT.txt"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: TypeScript check
        run: pnpm lint

      - name: Run visual security and lead contracts
        run: pnpm test -- --run

      - name: Build demo and embedded widget
        run: pnpm build

      - name: Create immutable build metadata
        shell: bash
        run: |
          node -e 'const fs=require("fs");fs.writeFileSync("dist/build-meta.json",JSON.stringify({sourceSha:process.env.GITHUB_SHA,generatedAt:new Date().toISOString(),version:"taste-system-20260723-v7"},null,2))'

      - name: Validate production artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/widget.js
          test -f dist/widget.css
          test -f dist/build-meta.json
          test -f api/lead.ts
          grep -Fq "taste-system-20260723-v7" dist/widget.js
          grep -Fq "Taste-system final layer" dist/widget.css
          grep -Fq "competition-winner-final" src/main.tsx
          grep -Fq "taste-system-final" src/main.tsx
          grep -Fq "installWidgetSpotlight" src/main.tsx
          grep -Fq "cw-chat-builder" dist/widget.css
          grep -Fq "cw-contact-stage" dist/widget.css
          grep -Fq "data-cw-spotlight" dist/widget.css
          grep -Fq "api/lead" src/lib/leadApi.ts
          grep -Fq "Ceny začínajú od 350 €" src/components/widget/AssistantConversation.tsx
          ! grep -Fq "className=\"cw-chip cw-spotlight\"" src/components/widget/AssistantConversation.tsx
          ! grep -Fq "label: \"Cena od 350 €\"" src/components/widget/AssistantConversation.tsx
          ! grep -Fq "REPLACE-ME" dist/widget.js
          grep -Fq "${GITHUB_SHA}" dist/build-meta.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify live demo and embedded assets
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BASE="${PAGE_URL%/}"

          verify() {
            local path="$1"
            local expected="$2"
            local body="/tmp/widget-live-$(echo "$path" | tr '/.' '__').txt"

            for attempt in {1..24}; do
              if curl --location --fail --silent --show-error \
                --header "Cache-Control: no-cache" \
                "${BASE}${path}?verify=${SOURCE_SHA}-${attempt}" > "$body"; then
                if grep -Fqi "$expected" "$body"; then
                  echo "verified ${path}"
                  return 0
                fi
              fi
              sleep 5
            done

            echo "Live verification failed for ${path}"
            head -c 1000 "$body" 2>/dev/null || true
            return 1
          }

          verify "/" "Môj Chatbot"
          verify "/widget.js" "taste-system-20260723-v7"
          verify "/widget.css" "Taste-system final layer"
          verify "/build-meta.json" "$SOURCE_SHA"

      - name: Checkout latest main for deployment record
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Record verified widget deployment
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          {
            echo "deployment=success"
            echo "dependency_audit=success"
            echo "live_smoke=success"
            echo "source_sha=${SOURCE_SHA}"
            echo "page_url=${PAGE_URL}"
            echo "deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > PAGES_DEPLOY_AUDIT.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PAGES_DEPLOY_AUDIT.txt
          git commit -m "chore: record verified widget deployment [skip widget-quality]" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
