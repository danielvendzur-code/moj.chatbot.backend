name: Apply approved submit

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/premium-submit-button'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout approved branch
        uses: actions/checkout@v4
        with:
          ref: agent/premium-submit-button
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Apply approved submit patch
        shell: bash
        env:
          PATCH_B64: 
        run: |
          set -euo pipefail
          printf '%s' "$PATCH_B64" | base64 --decode > /tmp/approved.patch.gz
          gzip -t /tmp/approved.patch.gz
          gzip -dc /tmp/approved.patch.gz > /tmp/approved.patch
          git apply --check --verbose /tmp/approved.patch
          git apply --verbose /tmp/approved.patch
          test -f src/approved-submit-final.css
          grep -Fq 'cw-submit--approved' src/components/widget/ToolCalculator.tsx

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate approved chatbot
        run: |
          pnpm lint
          pnpm test -- --run
          pnpm build

      - name: Commit approved source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/widget/ToolCalculator.tsx src/main.tsx src/embed.tsx src/approved-submit-final.css tests/widget-contract.test.mjs
          git diff --cached --quiet && exit 0
          git commit -m "Refine approved chatbot submit interaction"
          git push origin HEAD:agent/premium-submit-button
