name: Apply unified widget controls

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/unified-widget-controls'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/unified-widget-controls
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply audited widget patch
        shell: bash
        env:
          PATCH_B64: 
        run: |
          set -euo pipefail
          printf '%s' "$PATCH_B64" | base64 --decode | gzip -dc > /tmp/ui.patch
          git apply --check /tmp/ui.patch
          git apply /tmp/ui.patch
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate complete widget
        run: |
          pnpm lint
          pnpm test -- --run
          pnpm build
      - name: Commit validated product source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/approved-submit-final.css src/components/widget/AssistantConversation.tsx src/components/widget/ToolCalculator.tsx src/lib/assistantFlow.ts tests/widget-contract.test.mjs
          git diff --cached --quiet && exit 0
          git commit -m "Complete unified widget UI polish"
          git push origin HEAD:agent/unified-widget-controls
