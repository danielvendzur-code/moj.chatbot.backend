name: Widget quality audit

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: widget-quality
  cancel-in-progress: true

jobs:
  quality:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip widget-quality]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply mobile configurator polish
        id: transform
        continue-on-error: true
        run: python .github/apply-mobile-configurator-polish.py > /tmp/transform.log 2>&1

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        id: install
        continue-on-error: true
        run: pnpm install --frozen-lockfile > /tmp/install.log 2>&1

      - name: Format transformed source
        id: format
        if: steps.transform.outcome == 'success' && steps.install.outcome == 'success'
        continue-on-error: true
        run: pnpm exec prettier --write src/components/widget/ToolCalculator.tsx src/main.tsx src/embed.tsx src/mobile-configurator-polish.css tests/widget-contract.test.mjs > /tmp/format.log 2>&1

      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm lint > /tmp/lint.log 2>&1

      - name: Build
        id: build
        continue-on-error: true
        run: pnpm build > /tmp/build.log 2>&1

      - name: Test
        id: test
        continue-on-error: true
        run: pnpm test -- --run > /tmp/test.log 2>&1

      - name: Commit validated product source
        if: >-
          steps.transform.outcome == 'success' &&
          steps.install.outcome == 'success' &&
          steps.format.outcome == 'success' &&
          steps.lint.outcome == 'success' &&
          steps.build.outcome == 'success' &&
          steps.test.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/widget/ToolCalculator.tsx src/main.tsx src/embed.tsx src/mobile-configurator-polish.css tests/widget-contract.test.mjs
          if ! git diff --cached --quiet; then
            git commit -m "Compact mobile configurator and auto-advance choices [skip widget-quality]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Save result
        if: always()
        run: |
          {
            echo "run_id=${{ github.run_id }}"
            echo "transform=${{ steps.transform.outcome }}"
            echo "install=${{ steps.install.outcome }}"
            echo "format=${{ steps.format.outcome }}"
            echo "lint=${{ steps.lint.outcome }}"
            echo "build=${{ steps.build.outcome }}"
            echo "test=${{ steps.test.outcome }}"
            echo
            cat /tmp/transform.log 2>/dev/null || true
            cat /tmp/lint.log 2>/dev/null || true
            cat /tmp/build.log 2>/dev/null || true
            cat /tmp/test.log 2>/dev/null || true
          } > WIDGET_QUALITY_AUDIT.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add WIDGET_QUALITY_AUDIT.txt
          git commit -m "chore: ulož widget quality audit [skip widget-quality]" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
