name: Export visible widget source

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/visible-widget-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: visible-widget-source
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1
